    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Caveat', cursive;
            background: #f5f1e8;
            overflow: hidden;
            cursor: none;
            transition: background 1.5s ease;
        }

        body.enlightened {
            background: #fdfcfa;
            cursor: default !important;
        }

        body.enlightened .flashlight {
            opacity: 0 !important;
        }

        /* Paper texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.02) 2px, rgba(0,0,0,.02) 3px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,.02) 2px, rgba(0,0,0,.02) 3px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 1;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100vh;
            position: relative;
            z-index: 2;
        }

        /* Custom cursor (flashlight) */
        .flashlight {
            position: fixed;
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255, 200, 100, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transition: transform 0.1s ease;
            box-shadow: 0 0 20px rgba(255, 200, 100, 0.5);
        }

        .flashlight::after {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            background: rgba(255, 200, 100, 0.3);
        }

        /* Progress indicator */
        .progress-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
        }

        .progress-bar {
            width: 300px;
            height: 8px;
            background: rgba(100, 80, 60, 0.2);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            border: 2px solid rgba(100, 80, 60, 0.3);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4a574, #c9986a);
            width: 0%;
            transition: width 0.6s ease;
            box-shadow: 0 0 10px rgba(212, 165, 116, 0.5);
        }

        .progress-text {
            margin-top: 8px;
            font-size: 20px;
            color: #6b5d4f;
            font-weight: 600;
            letter-spacing: 1px;
            transition: color 1s ease;
        }

        body.enlightened .progress-text {
            color: #4a3f35;
        }

        /* Instructions */
        .instructions {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
            opacity: 1;
            transition: opacity 1s ease;
        }

        .instructions.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .instructions-title {
            font-size: 42px;
            color: #4a3f35;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 2px 2px 0 rgba(255,255,255,0.5);
            transition: color 1s ease, text-shadow 1s ease;
        }

        .instructions-subtitle {
            font-size: 24px;
            color: #8b7865;
            font-weight: 500;
            transition: color 1s ease;
        }

        body.enlightened .instructions-title {
            color: #2a2520;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
        }

        body.enlightened .instructions-subtitle {
            color: #6b5d4f;
        }

        /* Legend */
        .legend {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.7);
            padding: 20px;
            border-radius: 8px;
            border: 2px solid rgba(100, 80, 60, 0.3);
            z-index: 100;
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.1);
        }

        .legend-title {
            font-size: 22px;
            font-weight: 700;
            color: #4a3f35;
            margin-bottom: 12px;
            text-decoration: underline;
            text-decoration-style: wavy;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 18px;
            color: #6b5d4f;
        }

        .legend-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid currentColor;
        }

        /* Tooltip */
        .tooltip {
            position: fixed;
            background: rgba(255, 252, 245, 0.98);
            border: 3px solid #8b7865;
            border-radius: 12px;
            padding: 20px 24px;
            max-width: 500px;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.15);
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip-title {
            font-size: 26px;
            font-weight: 700;
            color: #4a3f35;
            margin-bottom: 8px;
        }

        .tooltip-description {
            font-size: 18px;
            line-height: 1.5;
            color: #6b5d4f;
        }

        /* Controls */
        .controls {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 100;
            display: flex;
            gap: 12px;
        }

            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid #6b5d4f;
            border-radius: 8px;
            font-family: 'Caveat', cursive;
            font-size: 20px;
            font-weight: 700;
            color: #4a3f35;
            cursor: pointer;
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

                    leaves: [

                    relativeX: 600,

                    leaves: [

                {

                    label: 'AI Tax',

                    size: 50,
                    color: '#228b22',
                    leaves: [

                {
                    id: 'solution-3',
                    type: 'solution',
                    label: 'Regulation',
                    description: 'Proposals range from non-proliferation frameworks (treating AI like nuclear weapons) to capture-resistant regulatory design. Political gridlock prevents coherent policy response as "the canary is still alive"—written from February 2026 perspective, before crisis fully manifests.',
                    relativeX: 650,
                    relativeY: 110,
                    size: 50,
                    color: '#228b22',
                    leaves: [
                        {
                            title: 'Non-proliferation frameworks proposed',
                            description: 'Proposals to treat AI development like nuclear weapons programs - restricted to licensed entities with international oversight. Aims to slow deployment speed to match societal adjustment capacity.'
                        },
                        {
                            title: 'Treat AI like nuclear weapons',
                            description: 'Restrict frontier AI development to small number of entities under international monitoring. Prevent race-to-bottom dynamics where competitive pressure forces premature deployment.'

                            description: 'Proposals for regulatory structures immune to industry capture. Independent oversight boards, mandatory safety testing, liability frameworks that internalize displacement costs.'
                        },
                        {

                            description: 'Regulatory proposals stall in political deadlock. Free-market advocates oppose intervention, progressives demand worker protections, tech industry lobbies against restrictions. "The canary is still alive" mentality delays action.'

                    ],
                    expanded: false
                },
                {
                    id: 'solution-4',
                    type: 'solution',
                    label: 'Job\nGuarantee',
                    description: 'The memo notably lacks detailed discussion of job guarantee programs or comprehensive retraining frameworks, highlighting policy vacuum in addressing structural rather than cyclical displacement.',
                    relativeX: 600,
                    relativeY: 300,
                    size: 50,
                    color: '#228b22',
                    leaves: [
                        {
                            title: 'Job guarantee programs lacking',
                            description: 'Memo notably avoids detailed discussion of federal job guarantee despite historical precedent (WPA, CCC). Policy proposals focus on income replacement rather than employment creation.'
                        },
                        {
                            title: 'Retraining frameworks missing',
                            description: 'No comprehensive retraining infrastructure proposed. Assumption that displaced workers can retrain for new roles ignores reality: AI learns faster than humans, making retraining futile for many.'
                        },
                        {
                            title: 'Policy vacuum in structural displacement',
                            description: 'Proposed solutions assume temporary cyclical downturn rather than permanent structural shift. No policy framework for economy where large fraction of population genuinely unemployable at market wages.'
                        },
                        {
                            title: 'Focus remains on cyclical solutions',
                            description: 'Political system still treating AI displacement as temporary transition requiring short-term relief. Failure to acknowledge this is permanent restructuring requiring new social contract between capital and labor.'

                    ],
                    expanded: false
                }
            ]
        };

        // Build full node list with absolute positions
        const nodes = [mapData.center];
        ['timeline', 'causes', 'consequences', 'solutions'].forEach(category => {
            mapData[category].forEach(node => {
                nodes.push({
                    ...node,
                    x: mapData.center.x + node.relativeX,
                    y: mapData.center.y + node.relativeY,
                    discovered: false,
                    revealProgress: 0,
                    leafNodes: []
                });
            });
        });

        // Center is always discovered
        mapData.center.discovered = true;
        mapData.center.revealProgress = 1;
        mapData.center.leafNodes = [];

        // Build connections
        const connections = [];
        // Timeline connections (chain)
        for (let i = 0; i < mapData.timeline.length; i++) {
            const fromId = i === 0 ? 'center' : mapData.timeline[i - 1].id;
            connections.push({ from: fromId, to: mapData.timeline[i].id });
        }
        // Other connections to center
        ['causes', 'consequences', 'solutions'].forEach(category => {
            mapData[category].forEach(node => {
                connections.push({ from: node.id, to: 'center' });
            });
        });

        // Mouse tracking
        let mouseScreenX = canvas.width / 2;
        let mouseScreenY = canvas.height / 2;
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let hoveredNode = null;

        canvas.addEventListener('mousemove', (e) => {
            mouseScreenX = e.clientX;
            mouseScreenY = e.clientY;
            mouseX = e.clientX - cameraX;
            mouseY = e.clientY - cameraY;

            // Update flashlight cursor (screen position)
            const flashlight = document.getElementById('flashlight');
            flashlight.style.left = `${mouseScreenX - 12}px`;
            flashlight.style.top = `${mouseScreenY - 12}px`;

            // Pan camera when mouse near edges (with distance-based speed)
            if (mouseScreenX < panEdgeThreshold) {
                const strength = 1 - (mouseScreenX / panEdgeThreshold);
                cameraX += panSpeed * strength;
            } else if (mouseScreenX > canvas.width - panEdgeThreshold) {
                const strength = 1 - ((canvas.width - mouseScreenX) / panEdgeThreshold);
                cameraX -= panSpeed * strength;
            }
            if (mouseScreenY < panEdgeThreshold) {
                const strength = 1 - (mouseScreenY / panEdgeThreshold);
                cameraY += panSpeed * strength;
            } else if (mouseScreenY > canvas.height - panEdgeThreshold) {
                const strength = 1 - ((canvas.height - mouseScreenY) / panEdgeThreshold);
                cameraY -= panSpeed * strength;
            }

            // Update world mouse position after camera pan
            mouseX = mouseScreenX - cameraX;
            mouseY = mouseScreenY - cameraY;

            // Check hover
            hoveredNode = null;
            nodes.forEach(node => {
                const dx = mouseX - node.x;
                const dy = mouseY - node.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < node.size) {
                    hoveredNode = node;
                }
            });

            updateTooltip();
        });

        // Trackpad/wheel scrolling support
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();

            // Use deltaX and deltaY from wheel event (works with trackpad gestures)
            cameraX += e.deltaX;
            cameraY += e.deltaY;

            // Update world mouse position after camera pan
            mouseX = mouseScreenX - cameraX;
            mouseY = mouseScreenY - cameraY;

            // Update hover after scrolling
            hoveredNode = null;
            nodes.forEach(node => {
                const dx = mouseX - node.x;
                const dy = mouseY - node.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < node.size) {
                    hoveredNode = node;
                }
            });

            updateTooltip();
        }, { passive: false });

        // Keyboard arrow keys for panning
        window.addEventListener('keydown', (e) => {
            const keyPanSpeed = 30;

            if (e.key === 'ArrowUp') {
                e.preventDefault();
                cameraY += keyPanSpeed;
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                cameraY -= keyPanSpeed;
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                cameraX += keyPanSpeed;
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                cameraX -= keyPanSpeed;
            }

            // Update world mouse position after keyboard pan
            mouseX = mouseScreenX - cameraX;
            mouseY = mouseScreenY - cameraY;
        });

        // Click to expand leaves
        canvas.addEventListener('click', (e) => {
            console.log('Click detected', hoveredNode);

            if (!hoveredNode) {
                console.log('No hovered node');
                return;
            }

            if (!hoveredNode.discovered) {
                console.log('Node not discovered yet');
                return;
            }

            if (!hoveredNode.leaves || hoveredNode.leaves.length === 0) {
                console.log('No leaves on this node');
                return;
            }

            if (hoveredNode.expanded) {
                console.log('Already expanded');
                return; // Once expanded, stays expanded
            }

            console.log('Expanding node with', hoveredNode.leaves.length, 'leaves');

            // Mark as expanded and ensure it stays bright
            hoveredNode.expanded = true;
            hoveredNode.revealProgress = 1;
            hoveredNode.discovered = true;

            // Create leaf nodes with better spacing
            const leafCount = hoveredNode.leaves.length;
            const leafRadius = 180; // Increased from 120
            const angleStep = (Math.PI * 2) / leafCount;
            const startAngle = -Math.PI / 2; // Start from top

            // Helper function to check if position overlaps with existing nodes
            function checkOverlap(x, y, size) {
                return nodes.some(node => {
                    const dx = x - node.x;
                    const dy = y - node.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    return distance < (size + node.size + 20); // 20px buffer
                });
            }

            hoveredNode.leafNodes = hoveredNode.leaves.map((leaf, i) => {
                let angle = startAngle + i * angleStep;
                let radius = leafRadius;
                let leafX = hoveredNode.x + Math.cos(angle) * radius;
                let leafY = hoveredNode.y + Math.sin(angle) * radius;

                // Try to find non-overlapping position
                let attempts = 0;
                while (checkOverlap(leafX, leafY, 40) && attempts < 8) {
                    // Try slightly different angles and distances
                    angle += Math.PI / 12;
                    radius += 30;
                    leafX = hoveredNode.x + Math.cos(angle) * radius;
                    leafY = hoveredNode.y + Math.sin(angle) * radius;
                    attempts++;
                }

                console.log(`Creating leaf ${i} at (${leafX}, ${leafY}) after ${attempts} adjustments`);

                return {
                    id: `${hoveredNode.id}-leaf-${i}`,
                    type: 'leaf',
                    label: leaf.title,
                    description: leaf.description,
                    x: leafX,
                    y: leafY,
                    size: 40,
                    color: hoveredNode.color,
                    discovered: true,
                    revealProgress: 0,
                    appearProgress: 0,
                    parent: hoveredNode.id
                };
            });

            console.log('Created', hoveredNode.leafNodes.length, 'leaf nodes');

            // Add to global nodes array
            nodes.push(...hoveredNode.leafNodes);

            console.log('Total nodes now:', nodes.length);
        });

        // Tooltip
        function updateTooltip() {
            const tooltip = document.getElementById('tooltip');
            if (hoveredNode && hoveredNode.revealProgress > 0.5) {
                tooltip.classList.add('visible');
                document.getElementById('tooltipTitle').textContent = hoveredNode.label.replace('\n', ' ');

                let description = hoveredNode.description;
                if (hoveredNode.leaves && hoveredNode.leaves.length > 0 && !hoveredNode.expanded) {
                    description += ' (Click to expand details)';
                }
                document.getElementById('tooltipDescription').textContent = description;

                // Use screen coordinates for tooltip
                tooltip.style.left = `${mouseScreenX + 30}px`;
                tooltip.style.top = `${mouseScreenY + 20}px`;
            } else {
                tooltip.classList.remove('visible');
            }
        }

        // Progress tracking
        function updateProgress() {
            const total = nodes.length - 1; // Exclude center
            const discovered = nodes.filter(n => n.discovered && n.id !== 'center').length;
            const percentage = Math.round((discovered / total) * 100);

            document.getElementById('progressText').textContent = `${percentage}% Discovered`;
            document.getElementById('progressFill').style.width = `${percentage}%`;

            if (percentage > 20) {
                document.getElementById('instructions').classList.add('hidden');
            }

            // Enlightenment mode at 100%
            if (percentage === 100) {
                document.body.classList.add('enlightened');
            }
        }

        // Drawing functions
        function drawHandDrawnCircle(x, y, radius, color, filled = false) {
            const points = 32;
            const angleStep = (Math.PI * 2) / points;

            ctx.beginPath();
            for (let i = 0; i <= points; i++) {
                const angle = i * angleStep;
                const variation = radius * (0.05 * Math.sin(i * 0.7) + 0.05 * Math.cos(i * 1.3));
                const r = radius + variation;
                const px = x + Math.cos(angle) * r;
                const py = y + Math.sin(angle) * r;

                if (i === 0) {
                    ctx.moveTo(px, py);
                } else {
                    ctx.lineTo(px, py);
                }
            }
            ctx.closePath();

            if (filled) {
                ctx.fillStyle = color;
                ctx.fill();
            }
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        function drawWavyLine(x1, y1, x2, y2, color, opacity) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const segments = Math.floor(distance / 20);

            ctx.beginPath();
            ctx.moveTo(x1, y1);

            for (let i = 1; i <= segments; i++) {
                const t = i / segments;
                const x = x1 + dx * t;
                const y = y1 + dy * t;
                const perpX = -dy / distance;
                const perpY = dx / distance;
                const wave = Math.sin(t * Math.PI * 3) * 5;
                const wx = x + perpX * wave;
                const wy = y + perpY * wave;
                ctx.lineTo(wx, wy);
            }

            ctx.strokeStyle = `rgba(${hexToRgb(color)}, ${opacity})`;
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result
                ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}`
                : '100, 80, 60';
        }

        // Main render loop
        function render() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Soft paper background
            ctx.fillStyle = '#f5f1e8';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Apply camera transform
            ctx.save();
            ctx.translate(cameraX, cameraY);

            // Update node discovery based on flashlight proximity
            const flashlightRadius = 180;
            const isEnlightened = document.body.classList.contains('enlightened');

            nodes.forEach(node => {
                if (node.id === 'center') return;

                // Animate leaf appearance
                if (node.type === 'leaf') {
                    if (node.appearProgress < 1) {
                        node.appearProgress = Math.min(1, node.appearProgress + 0.08);
                        node.revealProgress = node.appearProgress;
                    } else {
                        // Keep leaves fully visible once appeared
                        node.revealProgress = 1;
                    }
                    return;
                }

                const dx = mouseX - node.x;
                const dy = mouseY - node.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < flashlightRadius) {
                    const proximity = 1 - (distance / flashlightRadius);
                    node.revealProgress = Math.min(1, node.revealProgress + proximity * 0.08);

                    if (node.revealProgress > 0.7 && !node.discovered) {
                        node.discovered = true;
                        updateProgress();
                    }
                } else if (!node.discovered && !node.expanded) {
                    // Only fade if not discovered AND not expanded
                    node.revealProgress = Math.max(0, node.revealProgress - 0.02);
                } else {
                    // Keep discovered nodes and expanded nodes bright
                    node.revealProgress = 1;
                }
            });

            // Draw connections
            connections.forEach(conn => {
                const fromNode = nodes.find(n => n.id === conn.from);
                const toNode = nodes.find(n => n.id === conn.to);
                if (!fromNode || !toNode) return;

                // Stronger opacity for connections to/from expanded nodes
                let baseOpacity = Math.min(fromNode.revealProgress, toNode.revealProgress) * 0.4;
                if (fromNode.expanded || toNode.expanded) {
                    baseOpacity = Math.max(baseOpacity, 0.6);
                }

                if (baseOpacity > 0.05) {
                    drawWavyLine(fromNode.x, fromNode.y, toNode.x, toNode.y, fromNode.color, baseOpacity);
                }
            });

            // Draw connections from parents to leaves (always bright for expanded nodes)
            nodes.forEach(node => {
                if (node.leafNodes && node.leafNodes.length > 0) {
                    node.leafNodes.forEach(leaf => {
                        // Keep leaf connections bright
                        const opacity = Math.min(node.revealProgress, leaf.revealProgress) * 0.5;
                        if (opacity > 0.05) {
                            drawWavyLine(node.x, node.y, leaf.x, leaf.y, node.color, opacity);
                        }
                    });
                }
            });

            // Draw nodes
            nodes.forEach(node => {
                const baseOpacity = node.id === 'center' ? 1 : node.revealProgress;
                const dimOpacity = Math.max(0.1, baseOpacity);

                if (dimOpacity > 0.05) {
                    // Leaf nodes have special rendering
                    if (node.type === 'leaf') {
                        const glowIntensity = Math.sin(node.appearProgress * Math.PI);

                        // Strong glow effect for appearing leaves
                        if (node.appearProgress < 1) {
                            ctx.shadowColor = node.color;
                            ctx.shadowBlur = 30 * glowIntensity;
                        } else {
                            ctx.shadowColor = node.color;
                            ctx.shadowBlur = 10;
                        }

                        // Leaf background - brighter and more opaque
                        const fillColor = node.color;
                        const rgbColor = hexToRgb(fillColor);
                        ctx.globalAlpha = dimOpacity * 0.5;
                        drawHandDrawnCircle(node.x, node.y, node.size * 0.85, `rgba(${rgbColor}, 1)`, true);

                        // Leaf outline - stronger
                        ctx.globalAlpha = dimOpacity;
                        ctx.lineWidth = 3;
                        drawHandDrawnCircle(node.x, node.y, node.size, fillColor, false);

                        ctx.shadowBlur = 0;

                        // Leaf text - always visible once appeared
                        if (baseOpacity > 0.2) {
                            ctx.globalAlpha = Math.max(0.8, baseOpacity);
                            ctx.fillStyle = '#2a2520';
                            ctx.font = 'bold 15px Caveat';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';

                            // Word wrap for leaves
                            const maxWidth = node.size * 1.8;
                            const words = node.label.split(' ');
                            let line = '';
                            let lines = [];

                            words.forEach(word => {
                                const testLine = line + (line ? ' ' : '') + word;
                                const metrics = ctx.measureText(testLine);
                                if (metrics.width > maxWidth && line) {
                                    lines.push(line);
                                    line = word;
                                } else {
                                    line = testLine;
                                }
                            });
                            lines.push(line);

                            lines.forEach((line, i) => {
                                const offsetY = (i - (lines.length - 1) / 2) * 17;
                                ctx.fillText(line, node.x, node.y + offsetY);
                            });
                        }
                    } else {
                        // Regular node rendering
                        const fillColor = node.color;
                        const rgbColor = hexToRgb(fillColor);

                        // Add glow for expanded nodes
                        if (node.expanded) {
                            ctx.shadowColor = fillColor;
                            ctx.shadowBlur = 15;
                        }

                        ctx.globalAlpha = dimOpacity * 0.2;
                        drawHandDrawnCircle(node.x, node.y, node.size * 0.9, `rgba(${rgbColor}, 1)`, true);

                        // Node outline (stronger for expanded)
                        ctx.globalAlpha = node.expanded ? 1 : dimOpacity;
                        drawHandDrawnCircle(node.x, node.y, node.size, fillColor, false);

                        ctx.shadowBlur = 0;

                        // Inner circle accent
                        ctx.globalAlpha = dimOpacity * 0.6;
                        drawHandDrawnCircle(node.x, node.y, node.size * 0.25, fillColor, true);

                        // Label
                        if (baseOpacity > 0.3) {
                            ctx.globalAlpha = baseOpacity;
                            ctx.fillStyle = '#4a3f35';
                            ctx.font = 'bold 22px Caveat';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';

                            const lines = node.label.split('\n');
                            lines.forEach((line, i) => {
                                const offsetY = (i - (lines.length - 1) / 2) * 24;
                                ctx.fillText(line, node.x, node.y + offsetY);
                            });
                        }

                        // Expansion indicator (+ icon for unexpanded)
                        if (node.discovered && node.leaves && node.leaves.length > 0 && !node.expanded && baseOpacity > 0.5) {
                            // Draw a circle with + inside
                            ctx.globalAlpha = baseOpacity * 0.7;
                            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                            ctx.beginPath();
                            ctx.arc(node.x + node.size * 0.6, node.y - node.size * 0.6, 12, 0, Math.PI * 2);
                            ctx.fill();

                            ctx.globalAlpha = baseOpacity;
                            ctx.fillStyle = node.color;
                            ctx.font = 'bold 24px Arial';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText('+', node.x + node.size * 0.6, node.y - node.size * 0.6);
                        }
                    }

                    ctx.globalAlpha = 1;
                }
            });

            // Flashlight effect (radial gradient overlay) - only when not enlightened
            if (!isEnlightened) {
                const gradient = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, flashlightRadius);
                gradient.addColorStop(0, 'rgba(245, 241, 232, 0)');
                gradient.addColorStop(0.6, 'rgba(245, 241, 232, 0)');
                gradient.addColorStop(1, 'rgba(50, 40, 30, 0.7)');

                ctx.fillStyle = gradient;
                ctx.fillRect(-cameraX, -cameraY, canvas.width, canvas.height);
            }

            // Restore transform
            ctx.restore();

            requestAnimationFrame(render);
        }

        // Export functionality
        document.getElementById('exportBtn').addEventListener('click', () => {
            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = '2028-crisis-map.png';
            link.href = dataURL;
            link.click();
        });

        // Start rendering
        render();
    </script>
